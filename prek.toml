#:schema https://prek.j178.dev/docs/prek.schema.json

minimum_prek_version = "0.3.8"
default_install_hook_types = ["pre-commit", "pre-push"]
default_stages = ["pre-commit"]

[[repos]]
repo = "meta"

[[repos.hooks]]
id = "check-hooks-apply"
always_run = true
pass_filenames = false
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-useless-excludes"
always_run = true
pass_filenames = false
stages = ["pre-commit"]

[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "check-merge-conflict"
stages = ["pre-commit"]

[[repos.hooks]]
id = "detect-private-key"
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-added-large-files"
args = ["--maxkb=2048"]
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-case-conflict"
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-illegal-windows-names"
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-shebang-scripts-are-executable"
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-executables-have-shebangs"
stages = ["pre-commit"]

[[repos.hooks]]
id = "end-of-file-fixer"
stages = ["pre-commit"]

[[repos.hooks]]
id = "trailing-whitespace"
args = ["--markdown-linebreak-ext=md"]
stages = ["pre-commit"]

[[repos.hooks]]
id = "mixed-line-ending"
args = ["--fix=lf"]
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-yaml"
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-toml"
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-json"
stages = ["pre-commit"]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "ruff-format"
name = "ruff format"
entry = "uv run ruff format"
language = "system"
files = { glob = ["code/src/**/*.py", "code/tests/**/*.py"] }
stages = ["pre-commit"]

[[repos.hooks]]
id = "ruff-check"
name = "ruff check"
entry = "uv run ruff check --fix --exit-non-zero-on-fix"
language = "system"
files = { glob = ["code/src/**/*.py", "code/tests/**/*.py"] }
stages = ["pre-commit"]

[[repos.hooks]]
id = "ty-check"
name = "ty check"
entry = "uv run ty check code/src"
language = "system"
always_run = true
pass_filenames = false
stages = ["pre-push", "manual"]

[[repos.hooks]]
id = "pytest"
name = "pytest"
entry = "uv run pytest"
language = "system"
always_run = true
pass_filenames = false
stages = ["pre-push", "manual"]
